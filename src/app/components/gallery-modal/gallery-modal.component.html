<div class="gallery-modal" [class.active]="selectedImage" (click)="onOverlayClick($event)">
  <button class="gallery-close" type="button" (click)="closeModal()">×</button>

  <button class="gallery-nav prev" type="button" (click)="prevImage()">←</button>

  <div class="gallery-content">
    @if (selectedImage) {
      <img [src]="selectedImage" alt="Expanded preview" />
    }
  </div>

  <button class="gallery-nav next" type="button" (click)="nextImage()">→</button>
</div>
