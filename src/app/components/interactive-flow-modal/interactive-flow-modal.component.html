<div class="interactive-flow-modal modal-overlay" [class.active]="activeFlow" (click)="closeModal()">
  @if (activeFlow) {
    <div class="modal-content" (click)="$event.stopPropagation()">
      <button class="modal-button modal-close" type="button" (click)="closeModal()">×</button>

      <h3>{{ activeFlow.title }}</h3>

      <div class="modal-img-container prototype-container">
        <img [src]="getImageUrl()" class="prototype-screen modal-img" alt="Wireframe screen" />

        <div class="hotspots-overlay">
          @for (hotspot of activeFlow.screens[currentScreenId]?.hotspots; track $index) {
            <div
              class="hotspot"
              [style.left.%]="hotspot.x"
              [style.top.%]="hotspot.y"
              (click)="navigateToScreen(hotspot.targetScreenId)"
              [title]="hotspot.tooltip"
            ></div>
          }
        </div>
      </div>

      <!--<button class="flow-reset" type="button" (click)="resetFlow()">Reset Flow</button>-->
    </div>
  }
</div>
